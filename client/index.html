<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voxwire</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #181b22;
        --border: #2a2f3a;
        --text: #e6e8ee;
        --muted: #9aa3b2;
        --accent: #5b8cff;
        --ok: #3ecf8e;
        --warn: #ffc857;
        --err: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(560px, 92vw);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      .sub { color: var(--muted); margin: 0 0 16px; font-size: 14px; }
      .pipeline-state {
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 4px 10px;
        border-radius: 999px;
        background: #262b36;
        color: var(--muted);
        margin-bottom: 16px;
      }
      .pipeline-state.listening { background: #3a2020; color: var(--err); }
      .pipeline-state.thinking { background: #2a2a1a; color: var(--warn); }
      .pipeline-state.speaking { background: #1a2a3a; color: var(--accent); }
      .pipeline-state.error { background: #3a2020; color: var(--err); }
      .banner {
        display: none;
        font-size: 13px;
        line-height: 1.45;
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 14px;
        border: 1px solid var(--border);
        background: #1a1d24;
      }
      .banner.visible { display: block; }
      .banner.error { border-color: #5a3030; background: #221818; color: #ffb4b4; }
      .banner.warn { border-color: #5a5030; background: #221f18; color: var(--warn); }
      .banner.info { border-color: #30405a; color: var(--accent); }
      .row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px 16px;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.45; cursor: not-allowed; }
      button.secondary { background: #262b36; }
      .talk {
        width: 100%;
        padding: 16px;
        font-size: 15px;
        background: #262b36;
        user-select: none;
        touch-action: none;
      }
      .talk.recording { background: var(--err); }
      .mic-error {
        color: var(--err);
        font-size: 13px;
        margin: 0 0 14px;
        min-height: 16px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--muted);
        margin-left: auto;
      }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
      .dot.connecting { background: var(--warn); }
      .dot.connected { background: var(--ok); }
      .dot.error { background: var(--err); }
      #log {
        background: #0b0d12;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        height: 220px;
        overflow-y: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12.5px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .log-in { color: var(--accent); }
      .log-out { color: var(--ok); }
      .log-sys { color: var(--muted); }
      .debug-log { margin-top: 8px; }
      .debug-log summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
        user-select: none;
      }
      .debug-log #log { height: 140px; }
      .convo { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
      .chat-scroll {
        max-height: 240px;
        overflow-y: auto;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0b0d12;
        padding: 10px;
      }
      #chatLog:empty::before {
        content: "Your transcript and replies appear here.";
        color: var(--muted);
        font-size: 13px;
        display: block;
      }
      .turn { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
      .turn:last-child { margin-bottom: 0; }
      .turn-footnote {
        font-size: 12px;
        color: var(--warn);
        padding-left: 2px;
      }
      .bubble {
        background: #0b0d12;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        line-height: 1.5;
      }
      .bubble.assistant { border-color: #2c3a5a; }
      .bubble .who {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .bubble .text { white-space: pre-wrap; }
      .bubble .text:empty::after { content: "…"; color: var(--muted); }
      .bubble.you .text.partial { color: var(--muted); font-style: italic; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>voxwire</h1>
      <p class="sub">Connect, hold to talk, and watch your words stream back as speech.</p>
      <p id="pipelineState" class="pipeline-state" aria-live="polite">Idle</p>
      <p id="banner" class="banner" role="alert"></p>

      <div class="row">
        <button id="connect">Connect</button>
        <button id="ping" class="secondary" disabled>Send ping</button>
        <span class="status">
          <span id="dot" class="dot"></span>
          <span id="statusText">disconnected</span>
        </span>
      </div>

      <div class="row">
        <button id="talk" class="talk" disabled>Hold to talk</button>
      </div>
      <p id="micError" class="mic-error"></p>

      <div id="chatScroll" class="chat-scroll"><div id="chatLog"></div></div>

      <details class="debug-log">
        <summary>Debug log</summary>
        <div id="log"></div>
      </details>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
