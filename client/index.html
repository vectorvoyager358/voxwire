<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voxwire</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #181b22;
        --border: #2a2f3a;
        --text: #e6e8ee;
        --muted: #9aa3b2;
        --accent: #5b8cff;
        --ok: #3ecf8e;
        --warn: #ffc857;
        --err: #ff6b6b;
        --lat-upload: #6b7280;
        --lat-asr: #5b8cff;
        --lat-llm: #a78bfa;
        --lat-tts: #3ecf8e;
        --lat-overhead: #ffc857;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(620px, 92vw);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      .sub { color: var(--muted); margin: 0 0 16px; font-size: 14px; }
      .pipeline-state {
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 4px 10px;
        border-radius: 999px;
        background: #262b36;
        color: var(--muted);
        margin-bottom: 16px;
      }
      .pipeline-state.listening { background: #3a2020; color: var(--err); }
      .pipeline-state.thinking { background: #2a2a1a; color: var(--warn); }
      .pipeline-state.speaking { background: #1a2a3a; color: var(--accent); }
      .pipeline-state.error { background: #3a2020; color: var(--err); }
      .banner {
        display: none;
        font-size: 13px;
        line-height: 1.45;
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 14px;
        border: 1px solid var(--border);
        background: #1a1d24;
      }
      .banner.visible { display: block; }
      .banner.error { border-color: #5a3030; background: #221818; color: #ffb4b4; }
      .banner.warn { border-color: #5a5030; background: #221f18; color: var(--warn); }
      .banner.info { border-color: #30405a; color: var(--accent); }
      .banner-stage {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0 0 4px;
        opacity: 0.85;
      }
      .banner-message { margin: 0; font-size: 14px; line-height: 1.4; }
      .banner-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .banner-actions button {
        font-size: 13px;
        padding: 6px 12px;
      }
      .text-fallback {
        display: none;
        gap: 8px;
        margin: 0 0 12px;
      }
      .text-fallback.visible { display: flex; }
      .text-fallback input {
        flex: 1;
        min-width: 0;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
      }
      .row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px 16px;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.45; cursor: not-allowed; }
      button.secondary { background: #262b36; }
      .talk {
        width: 100%;
        padding: 16px;
        font-size: 15px;
        background: #262b36;
        user-select: none;
        touch-action: none;
      }
      .talk.recording { background: var(--err); }
      .mic-error {
        color: var(--err);
        font-size: 13px;
        margin: 0 0 14px;
        min-height: 16px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--muted);
        margin-left: auto;
      }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
      .dot.connecting { background: var(--warn); }
      .dot.connected { background: var(--ok); }
      .dot.error { background: var(--err); }
      #log {
        background: #0b0d12;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        height: 220px;
        overflow-y: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12.5px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .log-in { color: var(--accent); }
      .log-out { color: var(--ok); }
      .log-sys { color: var(--muted); }
      .debug-log { margin-top: 8px; }
      .debug-log summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
        user-select: none;
      }
      .debug-log #log { height: 140px; }
      .convo { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
      .chat-scroll {
        max-height: 240px;
        overflow-y: auto;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0b0d12;
        padding: 10px;
      }
      #chatLog:empty::before {
        content: "Your transcript and replies appear here.";
        color: var(--muted);
        font-size: 13px;
        display: block;
      }
      .turn { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
      .turn:last-child { margin-bottom: 0; }
      .turn-footnote {
        font-size: 12px;
        color: var(--muted);
        padding-left: 2px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .turn-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        border: 1px solid var(--border);
      }
      .turn-badge.degraded {
        border-color: #5a5030;
        color: var(--warn);
        background: #221f18;
      }
      .turn-badge.tts-skipped {
        border-color: #30405a;
        color: var(--accent);
        background: #151922;
      }
      .bubble {
        background: #0b0d12;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        line-height: 1.5;
      }
      .bubble.assistant { border-color: #2c3a5a; }
      .bubble-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 4px;
      }
      .bubble .who {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
      }
      .copy-btn {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        padding: 0;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
      }
      .copy-btn svg {
        display: block;
      }
      .copy-btn:hover:not(:disabled) {
        color: var(--text);
        border-color: var(--accent);
      }
      .copy-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .copy-btn.copied {
        color: var(--ok);
        border-color: var(--ok);
      }
      .bubble .text { white-space: pre-wrap; }
      .bubble .text:empty::after { content: "…"; color: var(--muted); }
      .bubble.you .text.partial { color: var(--muted); font-style: italic; }
      .latency-panel {
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0b0d12;
        padding: 12px;
      }
      .latency-panel h2 {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
      }
      .latency-hint {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
      }
      .latency-stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 8px;
        margin-bottom: 14px;
      }
      .latency-stat {
        background: #12151c;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .latency-stat.highlight {
        border-color: var(--warn);
        background: #1a1810;
      }
      .latency-stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
      }
      .latency-stat-value {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.2;
      }
      .latency-stat-hint {
        font-size: 10px;
        color: var(--muted);
      }
      .latency-waterfall { margin-bottom: 12px; }
      .latency-timeline-block {
        margin-bottom: 10px;
        padding-bottom: 8px;
      }
      .latency-timeline-block.capture { margin-bottom: 12px; }
      .latency-timeline-label {
        margin: 0 0 6px;
        font-size: 11px;
        color: var(--muted);
      }
      .latency-empty { margin: 0; font-size: 12px; color: var(--muted); }
      .latency-track {
        display: flex;
        width: 100%;
        height: 32px;
        border-radius: 6px;
        overflow: visible;
        border: 1px solid var(--border);
        background: #12151c;
      }
      .latency-track.capture-track { height: 20px; opacity: 0.85; }
      .latency-seg {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 2px;
        position: relative;
        cursor: help;
      }
      .latency-seg.seg-first { border-radius: 5px 0 0 5px; }
      .latency-seg.seg-last { border-radius: 0 5px 5px 0; }
      .latency-seg.seg-first.seg-last { border-radius: 5px; }
      .latency-seg-tooltip {
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 140px;
        max-width: 220px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #1a1f2a;
        color: var(--text);
        font-size: 11px;
        line-height: 1.35;
        text-align: center;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.12s ease, visibility 0.12s ease;
      }
      .latency-seg-tooltip strong {
        font-size: 12px;
        font-weight: 700;
      }
      .latency-seg-tooltip-desc { color: var(--muted); }
      .latency-seg-tooltip-meta { font-weight: 600; }
      .latency-seg-tooltip-bn {
        margin-top: 2px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--warn);
      }
      .latency-seg:hover .latency-seg-tooltip,
      .latency-seg:focus-visible .latency-seg-tooltip {
        opacity: 1;
        visibility: visible;
      }
      .latency-seg.capture-seg { background: #4b5563; }
      .latency-seg.bottleneck {
        box-shadow: inset 0 0 0 2px var(--warn);
        z-index: 1;
      }
      .latency-seg-label {
        font-size: 10px;
        font-weight: 600;
        line-height: 1.2;
        text-align: center;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        padding: 0 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }
      .latency-legend {
        margin: 6px 0 0;
        font-size: 10px;
        color: var(--muted);
        line-height: 1.4;
      }
      .latency-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .latency-table th,
      .latency-table td {
        padding: 6px 8px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      .latency-table th {
        color: var(--muted);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .latency-table tr:last-child td { border-bottom: none; }
      .latency-table tr.degraded td { color: var(--warn); }
      .latency-table td.bottleneck-cell {
        font-weight: 600;
        color: var(--warn);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>voxwire</h1>
      <p class="sub">Connect, hold to talk, and watch your words stream back as speech.</p>
      <p id="pipelineState" class="pipeline-state" aria-live="polite">Idle</p>
      <div id="banner" class="banner" role="alert">
        <p id="bannerStage" class="banner-stage" hidden></p>
        <p id="bannerMessage" class="banner-message"></p>
        <div id="bannerActions" class="banner-actions" hidden>
          <button id="bannerRetry" type="button" class="secondary">Try again</button>
        </div>
      </div>

      <div class="row">
        <button id="connect">Connect</button>
        <button id="ping" class="secondary" disabled>Send ping</button>
        <span class="status">
          <span id="dot" class="dot"></span>
          <span id="statusText">disconnected</span>
        </span>
      </div>

      <div class="row">
        <button id="talk" class="talk" disabled>Hold to talk</button>
      </div>
      <p id="micError" class="mic-error"></p>

      <div id="textFallback" class="text-fallback">
        <input id="textFallbackInput" type="text" placeholder="Type your message…" autocomplete="off" />
        <button id="textFallbackSend" type="button">Send</button>
      </div>

      <div id="chatScroll" class="chat-scroll"><div id="chatLog"></div></div>

      <section class="latency-panel" aria-label="Latency breakdown">
        <h2>Latency</h2>
        <div id="latencyStats" class="latency-stats"></div>
        <div id="latencyWaterfall" class="latency-waterfall"></div>
        <table class="latency-table">
          <thead>
            <tr>
              <th>Turn</th>
              <th>Total</th>
              <th>Felt</th>
              <th>Bottleneck</th>
            </tr>
          </thead>
          <tbody id="latencyTableBody"></tbody>
        </table>
      </section>

      <details class="debug-log">
        <summary>Debug log</summary>
        <div id="log"></div>
      </details>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
