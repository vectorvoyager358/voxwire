<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voxwire</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #181b22;
        --border: #2a2f3a;
        --text: #e6e8ee;
        --muted: #9aa3b2;
        --accent: #5b8cff;
        --ok: #3ecf8e;
        --warn: #ffc857;
        --err: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(560px, 92vw);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      .sub { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
      .row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px 16px;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.45; cursor: not-allowed; }
      button.secondary { background: #262b36; }
      .talk {
        width: 100%;
        padding: 16px;
        font-size: 15px;
        background: #262b36;
        user-select: none;
        touch-action: none;
      }
      .talk.recording { background: var(--err); }
      .mic-error {
        color: var(--err);
        font-size: 13px;
        margin: 0 0 14px;
        min-height: 16px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--muted);
        margin-left: auto;
      }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
      .dot.connecting { background: var(--warn); }
      .dot.connected { background: var(--ok); }
      .dot.error { background: var(--err); }
      #log {
        background: #0b0d12;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        height: 220px;
        overflow-y: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12.5px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .log-in { color: var(--accent); }
      .log-out { color: var(--ok); }
      .log-sys { color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>voxwire</h1>
      <p class="sub">Connect, then hold the button and speak. Audio streams to the server.</p>

      <div class="row">
        <button id="connect">Connect</button>
        <button id="ping" class="secondary" disabled>Send ping</button>
        <span class="status">
          <span id="dot" class="dot"></span>
          <span id="statusText">disconnected</span>
        </span>
      </div>

      <div class="row">
        <button id="talk" class="talk" disabled>Hold to talk</button>
      </div>
      <p id="micError" class="mic-error"></p>

      <div id="log"></div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
